<script>
// ========== 상태 관리 ==========
let volunteersDB = [];
let map = null;
let markers = [];
let overlays = [];
let clientMarker = null;
let clientOverlay = null;
let kakaoReady = false;

// ========== 로그인 ==========
function attemptLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  if (id === 'kpa8' && pw === '0000') {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-content').classList.remove('hidden');
    document.getElementById('main-content').classList.add('fade-in');
    initMap();
    loadFromStorage();
  } else {
    document.getElementById('login-error').classList.remove('hidden');
    document.getElementById('login-pw').value = '';
  }
}
function logout() {
  document.getElementById('main-content').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-id').value = '';
  document.getElementById('login-pw').value = '';
  document.getElementById('login-error').classList.add('hidden');
}

// ========== 토스트 ==========
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const colors = { info:'bg-accent-500', success:'bg-success-500', error:'bg-red-500', warning:'bg-amber-500' };
  const icons = { info:'fa-circle-info', success:'fa-circle-check', error:'fa-circle-exclamation', warning:'fa-triangle-exclamation' };
  const el = document.createElement('div');
  el.className = `toast ${colors[type]} text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2`;
  el.innerHTML = `<i class="fa-solid ${icons[type]}"></i>${message}`;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 3500);
}

// ========== 카카오맵 초기화 (핵심 수정) ==========
function initMap() {
  if (typeof kakao === 'undefined' || typeof kakao.maps === 'undefined') {
    showToast('카카오맵 SDK를 불러올 수 없습니다. API 키와 도메인 설정을 확인해주세요.', 'error');
    console.error('[KakaoMap] kakao 객체 없음 — API 키 또는 허용 도메인 확인 필요');
    return;
  }
  // autoload=false 이므로 반드시 kakao.maps.load() 콜백 안에서 생성
  kakao.maps.load(function() {
    try {
      const container = document.getElementById('kakao-map');
      map = new kakao.maps.Map(container, {
        center: new kakao.maps.LatLng(36.5, 127.5),
        level: 12
      });
      map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
      kakaoReady = true;
      console.log('[KakaoMap] 초기화 성공');
    } catch (e) {
      console.error('[KakaoMap] 초기화 실패:', e);
      showToast('카카오맵 초기화에 실패했습니다.', 'error');
    }
  });
}

// ========== 지오코딩 (API 준비 대기) ==========
function waitForKakao() {
  return new Promise((resolve, reject) => {
    if (kakaoReady) { resolve(); return; }
    let attempts = 0;
    const timer = setInterval(() => {
      if (kakaoReady) { clearInterval(timer); resolve(); }
      else if (++attempts > 50) { clearInterval(timer); reject(new Error('카카오맵 API 로딩 타임아웃(10초)')); }
    }, 200);
  });
}

async function geocodeAddress(address) {
  await waitForKakao();
  return new Promise((resolve, reject) => {
    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(address, (result, status) => {
      if (status === kakao.maps.services.Status.OK) {
        resolve({ lat: parseFloat(result[0].y), lng: parseFloat(result[0].x) });
      } else {
        reject(new Error(`주소 변환 실패: ${address}`));
      }
    });
  });
}

// ========== 엑셀 업로드 ==========
async function handleExcelUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById('upload-status');
  statusEl.classList.remove('hidden');
  statusEl.innerHTML = '<span class="spinner mr-2"></span>엑셀 파일을 읽는 중...';
  try {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
    if (json.length === 0) { showToast('엑셀 파일에 데이터가 없습니다.', 'error'); statusEl.classList.add('hidden'); return; }

    const colMap = detectColumns(json[0]);
    const volunteers = json.map((row, i) => ({
      id: i,
      직역: row[colMap.직역] || '', 이름: row[colMap.이름] || '', 이메일: row[colMap.이메일] || '',
      전화번호: String(row[colMap.전화번호] || ''), 소속기관: row[colMap.소속기관] || '',
      주소: row[colMap.주소] || '', 자격증: row[colMap.자격증] || '', 경력내용: row[colMap.경력내용] || '',
      활동분야: row[colMap.활동분야] || '', 대면비대면: row[colMap.대면비대면] || '',
      lat: null, lng: null
    }));

    statusEl.innerHTML = `<span class="spinner mr-2"></span>주소를 좌표로 변환 중... (0/${volunteers.length})`;
    let ok = 0, fail = 0;
    for (let i = 0; i < volunteers.length; i++) {
      const v = volunteers[i];
      if (!v.주소) { fail++; continue; }
      try { const c = await geocodeAddress(v.주소); v.lat = c.lat; v.lng = c.lng; ok++; }
      catch { console.warn(`Geocode 실패 [${v.이름}]:`, v.주소); fail++; }
      statusEl.innerHTML = `<span class="spinner mr-2"></span>주소를 좌표로 변환 중... (${i+1}/${volunteers.length})`;
    }
    volunteersDB = volunteers.filter(v => v.lat !== null);
    saveToStorage(); updateDataCount();
    statusEl.innerHTML = `<i class="fa-solid fa-circle-check text-success-500 mr-1"></i>완료: ${ok}명 변환 성공` + (fail > 0 ? `, ${fail}명 실패` : '');
    showToast(`${ok}명의 활동가 데이터가 등록되었습니다.`, 'success');
  } catch (e) { console.error(e); showToast('엑셀 파일 처리 중 오류가 발생했습니다.', 'error'); statusEl.classList.add('hidden'); }
  event.target.value = '';
}

function detectColumns(firstRow) {
  const keys = Object.keys(firstRow);
  const find = (kws) => keys.find(k => kws.some(kw => k.includes(kw))) || kws[0];
  return {
    직역: find(['직역','직종','분류']), 이름: find(['이름','성명','name']),
    이메일: find(['이메일','메일','email']), 전화번호: find(['전화','연락처','phone','핸드폰']),
    소속기관: find(['소속','기관','직장']), 주소: find(['주소','address','거주지']),
    자격증: find(['자격증','자격','면허']), 경력내용: find(['경력','이력','career']),
    활동분야: find(['활동분야','활동','분야','전문']), 대면비대면: find(['대면','비대면','방식','mode'])
  };
}

// ========== LocalStorage ==========
function saveToStorage() { localStorage.setItem('kpa_volunteers', JSON.stringify(volunteersDB)); }
function loadFromStorage() {
  try {
    const s = localStorage.getItem('kpa_volunteers');
    if (s) { volunteersDB = JSON.parse(s); updateDataCount();
      if (volunteersDB.length > 0) { const el = document.getElementById('upload-status'); el.classList.remove('hidden');
        el.innerHTML = `<i class="fa-solid fa-database text-accent-500 mr-1"></i>저장된 데이터 ${volunteersDB.length}명 로드 완료`;
        showToast(`저장된 ${volunteersDB.length}명의 데이터를 불러왔습니다.`, 'info'); } }
  } catch(e) { console.warn('LocalStorage 로드 실패', e); }
}
function clearData() {
  if (!confirm('모든 활동가 데이터를 삭제하시겠습니까?')) return;
  volunteersDB = []; localStorage.removeItem('kpa_volunteers'); updateDataCount(); clearMapMarkers();
  document.getElementById('result-list').classList.add('hidden');
  document.getElementById('result-placeholder').classList.remove('hidden');
  document.getElementById('upload-status').classList.add('hidden');
  showToast('데이터가 초기화되었습니다.', 'warning');
}
function updateDataCount() { document.getElementById('data-count').textContent = `${volunteersDB.length}명`; }

// ========== 하버사인 ==========
function haversineDistance(lat1, lng1, lat2, lng2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ========== TOP 5 매칭 ==========
async function searchMatch() {
  const address = document.getElementById('client-address').value.trim();
  if (!address) { showToast('내담자 주소를 입력해주세요.', 'warning'); return; }
  if (volunteersDB.length === 0) { showToast('먼저 활동가 데이터를 업로드해주세요.', 'warning'); return; }
  const btn = document.getElementById('search-btn');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;
  try {
    const cc = await geocodeAddress(address);
    const fFace = document.getElementById('filter-face').checked, fRemote = document.getElementById('filter-remote').checked;
    let filtered = volunteersDB.filter(v => {
      if (fFace && fRemote) return true;
      if (fFace && !fRemote) return !v.대면비대면.includes('비대면');
      if (!fFace && fRemote) return v.대면비대면.includes('비대면');
      return true;
    });
    const wd = filtered.map(v => ({ ...v, distance: haversineDistance(cc.lat, cc.lng, v.lat, v.lng) }));
    wd.sort((a,b) => a.distance - b.distance);
    const top5 = wd.slice(0, 5);
    renderResults(top5); renderMap(cc, top5);
    document.getElementById('map-badge').classList.add('hidden');
  } catch(e) { console.error(e); showToast('주소를 찾을 수 없습니다. 정확한 주소를 입력해주세요.', 'error'); }
  finally { btn.innerHTML = '<i class="fa-solid fa-magnifying-glass text-xs"></i><span>검색</span>'; btn.disabled = false; }
}

// ========== 결과 렌더링 ==========
function renderResults(top5) {
  const listEl = document.getElementById('result-list'), ph = document.getElementById('result-placeholder');
  ph.classList.add('hidden'); listEl.classList.remove('hidden'); listEl.innerHTML = '';
  top5.forEach((v, i) => {
    const ds = v.distance < 1 ? `${(v.distance*1000).toFixed(0)}m` : `${v.distance.toFixed(1)}km`;
    const card = document.createElement('div');
    card.className = 'volunteer-card bg-white rounded-xl p-3.5 cursor-pointer border border-navy-100 fade-in';
    card.style.animationDelay = `${i*0.08}s`;
    card.onclick = () => showDetail(v, i+1);
    card.innerHTML = `<div class="flex items-start gap-3"><div class="rank-badge rank-${i+1}">${i+1}</div><div class="flex-1 min-w-0"><div class="flex items-center justify-between"><span class="font-semibold text-sm text-navy-800">${v.이름}</span><span class="text-xs font-medium text-accent-600 bg-accent-500/10 px-2 py-0.5 rounded-full">${ds}</span></div><p class="text-xs text-navy-400 mt-0.5 truncate">${v.소속기관||'소속 미등록'}</p><div class="flex items-center gap-2 mt-1.5">${v.자격증?`<span class="text-[11px] bg-navy-50 text-navy-500 px-1.5 py-0.5 rounded">${truncate(v.자격증,12)}</span>`:''} ${v.대면비대면?`<span class="text-[11px] bg-success-500/10 text-success-600 px-1.5 py-0.5 rounded">${v.대면비대면}</span>`:''}</div></div><i class="fa-solid fa-chevron-right text-navy-300 text-xs mt-1"></i></div>`;
    listEl.appendChild(card);
  });
}
function truncate(s, l) { return s.length > l ? s.slice(0,l)+'…' : s; }

// ========== 상세 팝업 ==========
function showDetail(v, rank) {
  document.getElementById('detail-popup').classList.remove('hidden');
  document.getElementById('popup-title').textContent = `${rank}위 · ${v.이름}`;
  const fields = [
    {icon:'fa-user-tag',label:'직역',value:v.직역},{icon:'fa-building',label:'소속기관',value:v.소속기관},
    {icon:'fa-location-dot',label:'주소',value:v.주소},{icon:'fa-phone',label:'전화번호',value:v.전화번호},
    {icon:'fa-envelope',label:'이메일',value:v.이메일},{icon:'fa-certificate',label:'자격증',value:v.자격증},
    {icon:'fa-briefcase',label:'경력내용',value:v.경력내용},{icon:'fa-layer-group',label:'활동분야',value:v.활동분야},
    {icon:'fa-video',label:'대면/비대면',value:v.대면비대면}
  ];
  document.getElementById('popup-content').innerHTML = fields.filter(f=>f.value).map(f=>`
    <div class="flex items-start gap-3 py-2 border-b border-navy-50 last:border-0">
      <div class="w-7 h-7 rounded-lg bg-navy-50 flex items-center justify-center flex-shrink-0 mt-0.5"><i class="fa-solid ${f.icon} text-xs text-navy-400"></i></div>
      <div class="min-w-0"><p class="text-[11px] text-navy-400 font-medium">${f.label}</p><p class="text-sm text-navy-800 break-words">${f.value}</p></div>
    </div>`).join('');
}
function closePopup() { document.getElementById('detail-popup').classList.add('hidden'); }

// ========== 지도 마커 ==========
function clearMapMarkers() {
  markers.forEach(m=>m.setMap(null)); overlays.forEach(o=>o.setMap(null)); markers=[]; overlays=[];
  if(clientMarker){clientMarker.setMap(null);clientMarker=null;}
  if(clientOverlay){clientOverlay.setMap(null);clientOverlay=null;}
}
function renderMap(cc, top5) {
  if (!map) return;
  clearMapMarkers();
  const cp = new kakao.maps.LatLng(cc.lat, cc.lng);
  clientMarker = new kakao.maps.Marker({ position:cp, map:map, image: new kakao.maps.MarkerImage('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png', new kakao.maps.Size(24,35)), zIndex:10 });
  clientOverlay = new kakao.maps.CustomOverlay({ position:cp, content:'<div class="marker-label client"><i class="fa-solid fa-user" style="margin-right:4px"></i>내담자</div>', yAnchor:2.2, map:map });
  const bounds = new kakao.maps.LatLngBounds();
  bounds.extend(cp);
  top5.forEach((v,i) => {
    const pos = new kakao.maps.LatLng(v.lat, v.lng);
    bounds.extend(pos);
    const m = new kakao.maps.Marker({position:pos, map:map, zIndex:5});
    markers.push(m);
    const o = new kakao.maps.CustomOverlay({ position:pos, content:`<div class="marker-label">${i+1}위 ${v.이름} (${v.distance<1?(v.distance*1000).toFixed(0)+'m':v.distance.toFixed(1)+'km'})</div>`, yAnchor:2.2, map:map });
    overlays.push(o);
    kakao.maps.event.addListener(m, 'click', ()=>showDetail(v, i+1));
  });
  map.setBounds(bounds, 80);
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closePopup(); });
</script>
